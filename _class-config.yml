# Course-level configuration. Single source of truth for course-wide
# values used by the syllabus, lecture headers, navbar title, and other
# pages. Edit these per class/semester — pre-render.R propagates them.
#
# NOTE: changes to `course_name` may require running `quarto render` twice
# the first time, because the navbar title in _quarto.yml is read before
# pre-render updates it. The second render picks up the new value.

course_name: "Course Name"
course_instructor: "Instructor Name"
course_instructor_email: "instructor@example.edu"
course_meeting_time: "Thursdays, 4:30–7:00pm"
course_office_hours: "Mondays 1:30-2:30; By appointment"

# Semester schedule
class_start: 2026-05-18      # First day of the semester (any day in week 1)
class_days: [Monday]        # Days of the week the class meets
weeks: 10                     # Number of weeks in the semester
class_start_time: "16:30"     # 24-hour HH:MM — when class actually starts
timezone: "Pacific/Honolulu"  # IANA timezone — used by release-date gating

# Holidays / non-instructional days that fall on a class meeting day.
# Key = ISO date, value = label shown in the Topic column.
holidays:
  "2026-11-26": "HOLIDAY: Thanksgiving"
